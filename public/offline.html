<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Warung Bu Neni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --sky-50: #F0F9FF;
      --sky-100: #E0F2FE;
      --sky-200: #BAE6FD;
      --sky-300: #7DD3FC;
      --sky-400: #38BDF8;
      --sky-500: #0EA5E9;
      --sky-600: #0284C7;
      --sky-700: #0369A1;
      --sky-800: #075985;
      --sky-950: #082F49;
      --radius: 14px;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-blur: blur(16px);
      --glow-blue: 0 0 15px rgba(14, 165, 233, 0.5), 0 0 30px rgba(14, 165, 233, 0.3);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 30%, #E0F2FE 60%, #BAE6FD 100%);
      background-attachment: fixed;
      color: var(--sky-950);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Floating Blobs for decoration */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(65px);
      opacity: 0.35;
    }

    body::before {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--sky-300), transparent 70%);
      top: -50px;
      right: -50px;
      animation: floatBlob1 15s ease-in-out infinite;
    }

    body::after {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, var(--sky-200), transparent 70%);
      bottom: -50px;
      left: -50px;
      animation: floatBlob2 18s ease-in-out infinite;
    }

    @keyframes floatBlob1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 30px) scale(1.1); }
    }

    @keyframes floatBlob2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.08); }
    }

    .offline-card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(14, 165, 233, 0.15);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 50px rgba(14, 165, 233, 0.1);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .icon-wrapper {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, var(--sky-100), rgba(255, 255, 255, 0.6));
      border: 1.5px solid rgba(14, 165, 233, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--sky-500);
      font-size: 2.5rem;
      box-shadow: var(--glow-blue);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(14, 165, 233, 0.6); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--sky-800);
      margin-bottom: 12px;
    }

    p {
      font-size: 0.95rem;
      color: var(--sky-600);
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--sky-500), var(--sky-600));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
      transition: all 0.3s ease;
      text-decoration: none;
      outline: none;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--glow-blue);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .offline-footer {
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--sky-400);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="offline-card">
    <div class="icon-wrapper">
      <i class="fas fa-wifi-slash"></i>
    </div>
    <h1>Koneksi Terputus</h1>
    <p>Ups! Kamu sedang offline. Periksa kembali koneksi internet atau Wi-Fi kamu untuk melanjutkan pemesanan hidangan lezat di Warung Bu Neni.</p>
    
    <button onclick="window.location.reload()" class="btn">
      <i class="fas fa-sync-alt"></i> Coba Lagi
    </button>
    
    <div class="offline-footer">
      &copy; 2026 Warung Makan Bu Neni &bull; PWA Offline Mode
    </div>
  </div>

</body>
</html>
